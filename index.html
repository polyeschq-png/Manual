<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLY 교육 자료실</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --blue:#0b3d91; --blue-2:#1657c8; --blue-ink:#08306b;
  --purple:#5b3e8e; --ink:#232733; --muted:#6a7180; --line:#e6e8ee; --bg:#eef1f6; --card:#fff;
  --radius:16px; --shadow:0 1px 3px rgba(16,24,40,.06),0 10px 30px rgba(16,24,40,.07);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;letter-spacing:-.01em}
a{color:inherit;text-decoration:none}

.nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);height:60px;display:flex;align-items:center;gap:12px;padding:0 clamp(16px,4vw,40px)}
.nav .mark{width:36px;height:36px;border-radius:10px;background:radial-gradient(circle at 30% 30%,#2f6bff,#0b3d91 70%);
  position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
.nav .mark::after{content:"P";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-weight:800;font-size:19px}
.nav .t{font-weight:800;font-size:17px}
.nav .t span{color:var(--muted);font-weight:600;font-size:13px;margin-left:6px}

.hero{position:relative;overflow:hidden;color:#fff;
  background:linear-gradient(120deg,#0a2f75,#0b3d91 45%,#1657c8 120%);padding:56px clamp(16px,4vw,40px) 60px}
.hero .sw{position:absolute;right:-120px;top:-150px;width:520px;height:520px;border-radius:50%;border:90px solid rgba(255,255,255,.07)}
.hero .in{position:relative;z-index:2;max-width:1100px;margin:0 auto}
.hero .ey{font-size:13px;letter-spacing:.2em;color:#a9c4ff;font-weight:700}
.hero h1{font-size:clamp(30px,5vw,46px);margin:12px 0 8px;font-weight:800}
.hero p{font-size:clamp(15px,2vw,18px);color:#dbe6ff;max-width:640px;margin:0}

.wrap{max-width:1100px;margin:0 auto;padding:0 clamp(16px,4vw,40px)}
.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:30px 0 6px}
.toolbar h2{font-size:20px;margin:0;font-weight:800}
.count{background:#e7edfb;color:var(--blue-ink);border-radius:999px;padding:3px 11px;font-size:13px;font-weight:800}
.search{margin-left:auto;position:relative}
.search input{border:1px solid var(--line);border-radius:10px;padding:9px 13px 9px 34px;font-size:14px;font-family:inherit;
  width:min(280px,60vw);background:#fff}
.search::before{content:"🔎";position:absolute;left:11px;top:8px;font-size:14px;opacity:.6}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--muted)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin:20px 0 60px}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:22px 22px 18px;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s;position:relative}
a.mcard:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(16,24,40,.14)}
.mcard .cat{font-size:12px;font-weight:800;color:var(--purple);letter-spacing:.02em}
.mcard h3{margin:8px 0 8px;font-size:19px;font-weight:800;line-height:1.3}
.mcard p{margin:0;color:#4a5261;font-size:14px;line-height:1.6;flex:1}
.mcard .foot{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:12.5px;color:var(--muted);font-weight:600}
.mcard .go{margin-left:auto;color:var(--blue);font-weight:800}
.mcard.soon{opacity:.72}
.mcard.soon .go{color:var(--muted)}
.badge{position:absolute;top:16px;right:16px;font-size:11px;font-weight:800;border-radius:6px;padding:2px 8px}
.badge.new{background:#eefaf5;color:#0c7a5f;border:1px solid #bfe8db}
.badge.soon{background:#f3f4f7;color:#8a92a3;border:1px solid #e2e5ec}

.addcard{border:2px dashed #c7cfdd;background:#f7f9fc;border-radius:var(--radius);padding:22px;display:flex;
  flex-direction:column;justify-content:center;color:var(--muted);font-size:13.5px;line-height:1.6}
.addcard b{color:var(--blue-ink)}
.addcard code{background:#eef2f9;border-radius:5px;padding:1px 6px;font-size:12px}

.foot-note{border-top:1px solid var(--line);padding:22px 0 50px;color:var(--muted);font-size:12.5px;text-align:center}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;font-size:14px}

/* 본문 검색 결과 */
.ft{display:none;margin:10px 0 6px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.ft-head{padding:10px 16px;font-size:13px;font-weight:800;color:#08306b;background:#eef2fb}
.ft a{display:block;padding:10px 16px;border-top:1px solid #eef0f5}
.ft a:hover{background:#f6f8fd}
.ft .bk{display:inline-block;font-size:11px;font-weight:800;border-radius:5px;padding:1px 7px;margin-right:8px;background:#e7edfb;color:#08306b;vertical-align:1px}
.ft .tt{font-weight:800;font-size:14px;color:var(--ink)}
.ft .chn{color:var(--muted);font-size:12px;margin-left:7px;font-weight:600}
.ft .sn{color:#4a5261;font-size:12.5px;margin-top:3px;line-height:1.55}
.ft mark{background:#ffe9a8;color:inherit;padding:0 1px;border-radius:2px}
.ft .more{padding:9px 16px;font-size:12px;color:var(--muted);border-top:1px solid #eef0f5}
</style>
</head>
<body>

<nav class="nav">
  <div class="mark"></div>
  <div class="t">POLY 교육 자료실 <span>인사팀</span></div>
</nav>

<header class="hero">
  <div class="sw"></div>
  <div class="in">
    <div class="ey">POLY · 폴리어학원</div>
    <h1>교육 자료실</h1>
    <p>폴리 캠퍼스 운영에 필요한 교육 자료를 한 곳에서 봅니다. 아래에서 원하는 교재를 선택해 열어보세요.</p>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <h2>교재 목록</h2>
    <span class="count" id="count">0</span>
    <div class="search"><input id="q" type="search" placeholder="본문 키워드 검색… (예: 급여)" aria-label="본문 검색"></div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="ft" id="ftResults"></div>
  <div class="grid" id="grid"></div>
  <div class="foot-note">
    ㈜폴리이에스씨 인사팀 · 내부 교육용<br>
    <span style="opacity:.7">새 교재 추가 방법은 아래 index.html 상단의 MATERIALS 목록 주석을 참고하세요.</span>
  </div>
</main>

      - desc     : 한두 줄 설명

무 가이드북","c":"급여 등 관련 업무 절차","t":"6-4 완료데이터 송부 D-5 (인사팀 → 원장님)","a":"sec-6-4","x":"특이사항 회신자료 및 입/퇴사통보서를 기준으로 최종 급여대장 작성하여 완료데이터 송부"},{"f":"POLYESC_인사노무_가이드북.html","b":"원장 인사노무 가이드북","c":"급여 등 관련 업무 절차","t":"6-5 KCMS 급여 입력 D-4 (원장님)","a":"sec-6-5","x":"인수인계 전임 원장님께 반드시 배워두실 부분입니다. 급여대장 완료데이터를 기준으로 KCMS에 급여입력 이때, KCMS 급여입력자료 = 캠퍼스 근로자의 급여명세서 가 되므로 오류 없이 입력해주셔야 함 또한, 급여입력이 완료되어야 은행에 송부하는 이체명세서 작성이 가능하므로 최소 급여지급일 D-1일까지는 KCMS에 필히 입력 (입력해주시면 인사팀에서 오류사항이 없는지 더블 체크) KCMS 급여등록 관련 상세안내 1. KCMS 직원등록 경로 : KCMS > 직원관리 > 직원 > 직원 > 신규등록 ① 직원 중복체크 : 직원명·생년월일 기재 > 중복확인 > 적용 ② 기본정보 기재 > 저장 영문명 / 휴대폰 / 주민(외국어)번호 / 이메일 / ★아이디★ / 주소 / 입사일 / 직급(기타) / 직책 / 권한 / 은행명 / 예금주 / 계좌번호 등 필히 기재 2. KCMS 급여등록 경로 : KCMS > 직원관리 > 급여 > 급여등록조회 ① 일괄등록(좌측 하단) : 전월 급여를 자동으로 끌어옵니다. ② 등록년월 설정 : 급여가 지급되는 월 적용 EX) 5월귀속(6/10지급)일 경우 2026년 6월로 적용 ③ 자동 생성된 전월급여를 이번달 급여내용으로 수정 > 저장 (우측하단) — 기본급~주민세까지 근로자별 금액 수정, 직원추가로 신규입사자 추가 기입 가능 ④ 인사팀 급여대장과 KCMS 급여등록 금액 점검 (하단 Excel 다운로드로 비교, 인사팀에서도 더블체크) ⑤ 금액 수정 : KCMS > 직원관리 > 급여 > 급여정보 / 상태 : 전체 > 재직으로 변경 > Search > 근로자 선택 > 금액 수정 후 저장 ★ 필수 KCMS 급여등록은 근로자의 급여명세서가 되므로, 반드시 오류 없이 급여 지급일 전 완료되어야 합니다."},{"f":"POLYESC_인사노무_가이드북.html","b":"원장 인사노무 가이드북","c":"급여 등 관련 업무 절차","t":"6-6 퇴직연금 적립, 원천세 송부/납부 D-2 (인사팀 → 원장님)","a":"sec-6-6","x":"1. 퇴직연금 부담금 적립액 인사팀에서 당월 퇴직연금 적립 부담금을 원장님께 송부 급여지급일 신한은행에서 오후 3시 정도에 자동 출금 처리함 (자동 출금을 위해 지출 계좌에 자금확보 필수 ) 2. 원천세 납부서 송부 인사팀에서 당월 원천세 납부서를 원장님 및 회계담당자에게 송부 매달 10일(급여일)까지 소득세 및 지방소득세 직접 납부 ※ 주의 원천세의 경우 납부불성실 가산세 가 있으므로 반드시 10일까지 납부"},{"f":"POLYESC_인사노무_가이드북.html","b":"원장 인사노무 가이드북","c":"급여 등 관련 업무 절차","t":"6-7 계약서 문서 업로드 D+5 (원장님 → 인사팀)","a":"sec-6-7","x":"당월 입사자 및 연봉변동자의 계약서 사본과 퇴사자 사직서 등을 그룹웨어 문서에 업로드 진행"},{"f":"POLYESC_인사노무_가이드북.html","b":"원장 인사노무 가이드북","c":"모성보호 제도 안내","t":"개정 육아지원 3법에 따른 ’26년도 주요 개정 사항","a":"ch12","x":"1. 단기 육아휴직 신설 (26.08.20자) 단기 육아휴직은 1년에 1회 한정하여 주 단위로 사용할 수 있으며 그 기간은 1주 또는 2주로 함. ※ 분할 횟수에는 미포함 고용노동부령으로 정하는 사유에 한함(① 어린이집(이하 \"학교\")의 휴업 또는 휴원 명령 ② 소속 학교의 방학 ③ 질병 또는 사고로 입원 등) 2. 배우자 유산·사산 휴가 신설 (26.09.18자) 휴가를 청구하는 경우, 5일의 범위에서  리스크 관리","c":"노무 문제 예방 및 조치","t":"1-3 퇴직 처리","a":"sec-1-3","x":"당일퇴직 시, 무조건 즉시 사직서 먼저 받기! [퇴근할 때 받지 않기] 사직서 미작성 후 퇴직의 경우, 전화 녹취 및 메시지 대화저장 증빙 가능 절대 퇴직 먼저 권유하지 말 것! [부당해고 가능성 높음] 단, 심각한 인물 및 해고예고수당으로 바로 퇴직이 된다면 고려 가능"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"노무 문제 예방 및 조치","t":"1-4 ARC 미발급 원어민강사 퇴사","a":"sec-1-4","x":"ARC 미발급 원어민강사 퇴사 시, 해당 근로자의 소득으로 신고 불가 부득이한 경우이므로, 원장 소득에 반영하여 소득신고 진행 ARC 발급 이후 급여 지급하는 것을 추천"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"노무 문제 예방 및 조치","t":"참고 대표이사 필수 업무 지침 (공지 예시)","a":"ch01","x":"대표이사 금주 특별 공지 — 근태체크·휴가/외근 사전상신·연차관리대장 관리 지침"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"수습평가","t":"2-1 목적과 평가","a":"sec-2-1","x":"1) 목적 신규 입사자 채용 시, 바로 정식 직원으로 채용하지 않고 일정 수습 기간을 두고 자질을 평가하여 선발 여부를 판단 2) 수습 기간 및 평가 입사일로부터 3개월 수습기간 중 또는 종료 시 평가 진행 (직무적성·업무능력·근무태도 및 건강상태) 계속근무가 부적당하다고 인정되는 자는 채용을 취소하거나 거부 가능 (최대한 합리적 평가여야 함) 수습기간의 성적 등에 따라 수습기간을 연장할 수 있다. 3) 수습 기간 평가 회신 방법 합격 또는 재평가[수습연장] ▶ 별도 X 불합격 ▶ 수습평가서 작성 및 인사팀 사본 제출 수습평가서 양식"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"직장 내 괴롭힘","t":"3-1 직장 내 괴롭힘 정의","a":"sec-3-1","x":"사용자나 근로자가 직장에서의 지위 또는 관계 등의 우위를 이용하여 업무상 적정 범위를 넘어 다른 근로자에게 신체적/정신적 고통을 주거나 근무환경을 악화시키는 행위 요건 1 직장에서의 지위 또는 관계 등의 우위를 이용할 것 → 상급자 불리함 요건 2 업무상 적정 범위를 넘는 행위일 것 → 질책했더라도 업무상 적절했나? 요건 3 신체적·정신적 고통 또는 근무환경 악화 → 주관적 영역 (그래서 어려움)"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"직장 내 괴롭힘","t":"3-2 괴롭힘 인정 예시","a":"sec-3-2","x":"폭언, 욕설, 험담 등 언어적 행위 사적 용무 지시(개인적인 심부름) 집단 따돌림, 업무수행과정에서의 의도적 무시·배제 업무와 무관한 일 반복 지시 과도한 업무 부여 등 업무시간 이후 업무지시"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"직장 내 괴롭힘","t":"3-3 직장 내 괴롭힘 당사 사례","a":"sec-3-3","x":"#1 A캠퍼스 근무태도 및 업무상 문제에 대하여 1:1로 경고/조언을 하던 자리에서 내용 중 일부 모욕적 내용이 포함되어 고용노동청으로부터 신체/정신적 피해를 줄 개연성이 충분하며 근무환경을 악화시켰다 판단. 당사는 업무상 적정범위로 보았으나, 고용노동청은 징계 권고하여 징계함. 이와 같이 현재 추세는 특별한 증거가 부족함에도 피해자의 주관적인 입장에 입각한 판결 이 계속되고 있어 주의 필요함. #2 B캠퍼스 업무상 문제이긴 하지만 강압적이고 모욕적인 언행으로 직장 내 괴롭힘 신고가 접수되었으며, 신고자는 다수의 녹취본도 제출하였음. 3자가 보기에도 직설적이고 강압적이었으며, 주변 직원들의 증언도 그 내용을 뒷받침하였기에 당사 징계함. 고용노동청은 적절한 조치로 판단함. 인사팀에서 듣기에도 불편할 정도로 직설적이고 강압적이었으며, 업무 면담에서 좀 더 전략적인 대화가 필요해 보임. (언제든 녹취될 수 있다고 생각해야 함) #3 C캠퍼스 퇴직일과 관련하여 피해자와 원장/관리자와의 협의 과정에서 문제가 발생함. 어려운 일정을 앞두고 피해근무자의 기존 합의된 퇴직일에 대한 번복이 있어, 원장/관리자와의 과도한 설득/협박이 있었다고 판단. 당사는 업무상으로 보았으며, 단 관리자 관리의 책임을 물어 원장 경고 수준으로 마무리했으나, 고용노동청은 부족하여 시정지시를 요구했고, 결국 징계함. 피해 근로자의 잘못도 분명하게 많았으나, 고용노동청에서는 근무환경이 악화되었다고 판단함. (역시 편집된 녹취를 제출함) #4 D캠퍼스 일명 근로자 간의 ‘왕따’ 사건으로 피해자가 괴롭힘으로 신고한 사건. 내용은 KT 근로자끼리 한 직원을 따돌려(간식을 안 준다거나, 눈치를 준다거나, 쓰레기를 올려 둔다거나, 의자를 치워 둔다거나 등) 어려움을 호소함. 당사는 즉시 분리조치를 진행하고, 당사자들 및 참고인 조사를 진행하여 따돌림을 주도한 인원에게 징계함. 이 사건은 고용노동청까지 가지 않고 당사 내부적으로 해결된 건으로 유사한 형태의 문제가 많을 것으로 생각됨."},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"직장 내 괴롭힘","t":"3-4 직장 내 괴롭힘 대응 절차","a":"sec-3-4","x":"절차 내용 비고 사건 접수 ① 신고자 피해신고 ② 신고자와 가해용의자 즉시 분리조치 ③ 신고내용 정리, 직장 내 괴롭힘 사건일지 작성 ※ 신고자에 대한 비밀 보장 및 조속한 처리 핵심 인사팀 ▽ 직장 내 괴롭힘 발생 통보 ▽ 절차문의·협의 ▽ 판단내역 공유 ▽ 조치 및 최종내역 공유 (조사정리·사건일지) 조사 ① 신고자/가해용의자에 대해 현재 상황 및 조사계획 통보, 면담조사 진행 ② 피해자/가해용의자 면담 후 관련 참고인(직원 등) 별도 면담조사 진행 ③ 면담조사내용 및 사건일지 정리 ※ 가해용의자가 원장이면 인사팀 조사, 원장 外이면 원장 조사 판단 ① 전체적인 조사 내용을 종합하여 최종 판단 / 경중 유무 판단 ② 판단 내용·근거 정리, 괴롭힘 사건일지 정리 · 대부분 사안 : 경고 및 견책(시말서), 무혐의 · 심각 : 인사팀 통한 중징계(감봉 이상) 조치 ① 판단내용 조치 · 무혐의 : 신고자/가해용의자 모두에게 관련 판단 설명, 분리조치 중지 (이 경우 신고자는 고용노동청에 추가 신고할 여지 큼 — 조사내용/사건일지 정리 확실) · 경고/징계 : 가해자에게 경고/징계 통보(재발 방지 다짐), 신고자에게 안내, 분리조치 중지 · 중징계 : 인사팀을 통한 징계위원회 절차 후 중징계 통보, 신고자에게 안내, 분리조치 중지 ② 조사내용/사건일지/판단근거 정확히 정리 : 추후 고용노동청 제출자료가 됨 모니터링 판단 결과와 상관없이 무조건 신고자/가해용의자 이후 행동에 관심 가지고 모니터링"},{"f":"POLYESC_노무리스크_가이드북.html","b":"노무 리스크 관리","c":"징계 절차","t":"4-1 징계 종류","a":"sec-4-1","x":"경고 : 징계 아님 견책 : 경미한 사안 징계 [원장 가능, 징계처분통지서] 감봉 : 중징계 해당 [인사위원회 소집해야 가능] 정직 : 중징계 해당 [인사위원회 소집해야 가능] — 실효성 없음 강등 : 최고징계 해당 [인사위원회 소집해야 가능] 대기발령 : 최고징계 해당 [인사위원회 소집해야 가능] 해고 : 최고징계 해당 [인사위원회 소집해야 가능] — 매우 어려움 중요점 잘못한 점은 즉시 지적하고 경고나 견책은 반드시 서면으로 부여한다. 중대한 사안이 아닐 경우, 견책에서 바로 감봉 같은 중징계는 불가하니 견책을 쌓아간다 . [상습문제] 중대한 사안으로 인사위까지 열어 ‘해고’가 결정되어 해고시켜도, [부당해고]로 신고되어지는 확률이 매우 높습니다. 중징계/최고징계 전에 개선시키거나, 안 된다면 빠르게 [권고사직] 으로 마무리시키는 게 최우선입니다. ※ 권고사직이란 회사가 퇴직을 // ---- 본문 전체 검색 (SEARCH_INDEX 사용) ----
function escHtml(x){return x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hilite(txt,kw){
  var i=txt.toLowerCase().indexOf(kw.toLowerCase());
  if(i<0) return escHtml(txt);
  return escHtml(txt.slice(0,i))+'<mark>'+escHtml(txt.slice(i,i+kw.length))+'</mark>'+hilite(txt.slice(i+kw.length),kw);
}
function ftSearch(kw){
  var box=document.getElementById('ftResults');
  kw=kw.trim();
  if(typeof SEARCH_INDEX==='undefined' || kw.length<2){ box.style.display='none'; box.innerHTML=''; return; }
  var low=kw.toLowerCase(), hits=[];
  // 선택된 분류의 교재만 검색 (전체 선택 시 모든 교재)
  var allowed=null;
  if(activeCat!=='전체'){
    allowed={};
    MATERIALS.forEach(function(m){ if(m.category===activeCat) allowed[m.title]=1; });
  }
  SEARCH_INDEX.forEach(function(e){
    if(allowed && !allowed[e.b]) return;
    var inTitle=e.t.toLowerCase().indexOf(low)>-1;
    var px=e.x.toLowerCase().indexOf(low);
    if(!inTitle && px<0) return;
    var snip;
    if(px<0){ snip=e.x.slice(0,110)+(e.x.length>110?'…':''); }
    else{ var st=Math.max(0,px-45);
      snip=(st>0?'…':'')+e.x.slice(st,px+kw.length+75)+(px+kw.length+75<e.x.length?'…':''); }
    hits.push({e:e,snip:snip,rank:(inTitle?0:1)});
  });
  if(!hits.length){ box.style.display='block';
    box.innerHTML='<div class="ft-head">🔎 “'+escHtml(kw)+'” '+(activeCat!=='전체'?'['+escHtml(activeCat)+'] ':'')+'본문 검색 결과 없음'+(activeCat!=='전체'?' — 분류를 [전체]로 바꿔 다시 찾아보세요':'')+'</div>'; return; }
  hits.sort(function(a,b){return a.rank-b.rank;});
  // 교재별로 묶어서 표시 (각 교재 최대 7곳)
  var byBook={}, order=[];
  hits.forEach(function(h){ if(!byBook[h.e.b]){byBook[h.e.b]=[];order.push(h.e.b);} byBook[h.e.b].push(h); });
  var html='<div class="ft-head">🔎 “'+escHtml(kw)+'” '+(activeCat!=='전체'?'['+escHtml(activeCat)+'] ':'')+'본문 검색 결과 '+hits.length+'곳 · 교재 '+order.length+'권</div>';
  order.forEach(function(bname){
    var list=byBook[bname], CAP=7;
    list.slice(0,CAP).forEach(function(h){
      var e=h.e;
      html+='<a href="'+encodeURI(e.f)+'#'+e.a+'">'
          +'<span class="bk">'+escHtml(bname)+'</span>'
          +'<span class="tt">'+hilite(e.t,kw)+'</span><span class="chn">'+escHtml(e.c)+'</span>'
          +'<div class="sn">'+hilite(h.snip,kw)+'</div></a>';
    });
    if(list.length>CAP) html+='<div class="more">'+escHtml(bname)+' 외 '+(list.length-CAP)+'곳 더 — 검색어를 더 구체적으로</div>';
  });
  box.style.display='block'; box.innerHTML=html;
}

function card(m){
  var badge = m.status==='soon' ? '<span class="badge soon">준비 중</span>'
            : (m.isNew ? '<span class="badge new">NEW</span>' : '');
  var inner =
    '<div class="cat">'+m.category+'</div>'+
    (badge)+
    '<h3>'+m.title+'</h3>'+
    '<p>'+m.desc+'</p>'+
    '<div class="foot">'+(m.updated?('개정 '+m.updated):'준비 중')+
      '<span class="go">'+(m.status==='soon'?'준비 중':'열기 →')+'</span></div>';
  if(m.status==='active' && m.href){
    return '<a class="mcard" href="'+encodeURI(m.href)+'">'+inner+'</a>';
  }
  return '<div class="mcard soon">'+inner+'</div>';
}

function render(){
  var list=MATERIALS.filter(function(m){
    var okCat=(activeCat==='전체'||m.category===activeCat);
    var okKw=(!keyword || (m.title+' '+m.desc+' '+m.category).toLowerCase().indexOf(keyword)>-1);
    return okCat && okKw;
  });
  countEl.textContent=MATERIALS.filter(function(m){return m.status==='active';}).length+'개 교재';
  var html=list.map(card).join('');
  // 새 교재 추가 안내 카드
  html+='<div class="addcard"><b>＋ 새 교재 추가</b><br>guides 폴더에 HTML 파일을 넣고, <code>index.html</code> 상단의 <code>MATERIALS</code> 목록에 한 줄 추가하면 여기에 표시됩니다.</div>';
  grid.innerHTML = list.length? html : '<div class="empty">검색 결과가 없습니다.</div>'+html;
}
render();
</script>
</body>
</html>
